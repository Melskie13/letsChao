<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Modern Food Menu</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #eef2f3, #dfe9f3);
        }

        h2 {
            font-weight: 600;
        }

        /* Category Buttons */
        .category-btn {
            border-radius: 50px;
            padding: 8px 18px;
            transition: 0.3s;
        }

        .category-btn.active,
        .category-btn:hover {
            background: #0d6efd;
            color: white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        /* Card Styling */
        .menu-card {
            border: none;
            border-radius: 20px;
            overflow: hidden;
            background: rgba(255,255,255,0.7);
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
        }

        .menu-card:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 12px 25px rgba(0,0,0,0.2);
        }

        /* Image */
        .menu-card img {
            height: 180px;
            object-fit: cover;
            transition: 0.4s;
        }

        .menu-card:hover img {
            transform: scale(1.1);
        }

        /* Card Body */
        .card-body h5 {
            font-weight: 600;
        }

        .price {
            color: #0d6efd;
            font-weight: bold;
            font-size: 1.1rem;
        }
    </style>
</head>

<body>

<div class="container py-5">

    <h2 class="text-center mb-4">🍽️ Modern Food Menu</h2>

    <!-- Category Buttons -->
    <div class="text-center mb-4">
        <button class="btn btn-outline-primary category-btn active" data-category="all">All</button>
        <button class="btn btn-outline-primary category-btn" data-category="friedrice">Chao Fan</button>
         <button class="btn btn-outline-primary category-btn" data-category="platters">Platters</button>
        <button class="btn btn-outline-primary category-btn" data-category="yogurt">Frozen Yogurt</button>
        <button class="btn btn-outline-primary category-btn" data-category="drinks">Fresh Drinks</button>
        <button class="btn btn-outline-primary category-btn" data-category="icecream">Ice Cream</button>
        <button class="btn btn-outline-primary category-btn" data-category="coffee">Ice Coffee</button>
        <button class="btn btn-outline-primary category-btn" data-category="fruitea">Fruitea</button>
        <button class="btn btn-outline-primary category-btn" data-category="milkbase">Milk Based</button>
    </div>
    <!-- Menu Items -->
    <div class="row" id="menuContainer">

        <!-- Fried Rice -->
        <div class="col-md-3 mb-4 menu-item" data-category="friedrice">
            <div class="card menu-card">
                <img src="images/chicken-fried-rice.jpg" onerror="this.src='images/default.jpg'">
                <div class="card-body text-center">
                    <h5>Chicken Fried Rice</h5>
                    <p class="price">₱120</p>
                </div>
            </div>
        </div>

        <!-- Milktea -->
        <div class="col-md-3 mb-4 menu-item" data-category="milktea">
            <div class="card menu-card">
                <img src="images/milktea.jpg" onerror="this.src='images/default.jpg'">
                <div class="card-body text-center">
                    <h5>Classic Milktea</h5>
                    <p class="price">₱90</p>
                </div>
            </div>
        </div>

        <!-- Drinks -->
        <div class="col-md-3 mb-4 menu-item" data-category="drinks">
            <div class="card menu-card">
                <img src="images/lemonade.jpg" onerror="this.src='images/default.jpg'">
                <div class="card-body text-center">
                    <h5>Blue Lemonade</h5>
                    <p class="price">₱80</p>
                </div>
            </div>
        </div>

        <!-- Silog -->
        <div class="col-md-3 mb-4 menu-item" data-category="silog">
            <div class="card menu-card">
                <img src="images/tapsilog.jpg" onerror="this.src='images/default.jpg'">
                <div class="card-body text-center">
                    <h5>Tapsilog</h5>
                    <p class="price">₱120</p>
                </div>
            </div>
        </div>

    </div>
</div>

<!-- JS -->
<script>
    const buttons = document.querySelectorAll('.category-btn');
    const items = document.querySelectorAll('.menu-item');

    buttons.forEach(btn => {
        btn.addEventListener('click', function () {

            buttons.forEach(b => b.classList.remove('active'));
            this.classList.add('active');

            const category = this.getAttribute('data-category');

            items.forEach(item => {
                if (category === 'all' || item.getAttribute('data-category') === category) {
                    item.style.display = 'block';
                } else {
                    item.style.display = 'none';
                }
            });
        });
    });
</script>

</body>
</html>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Modern Food Menu</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #eef2f3, #dfe9f3);
        }

        h2 {
            font-weight: 600;
        }

        .card-img-top {
    width: 100%;
    height: 180px;
    object-fit: cover;
}

.best-seller-badge {
    position: absolute;
    top: 10px;
    left: 10px;
}

.card-body {
    font-size: 0.9rem;
}

        #addons-section .card-img-top {
    height: 120px;
    object-fit: cover;
}
    </style>
</head>

<body>

<div class="container-fluid">
    <div class="row">

        <!-- Sidebar -->
        <div class="col-md-3 col-lg-2 bg-light sidebar p-3">
            <h5 class="mb-3">Menu</h5>

            <div class="list-group">
                <button class="list-group-item list-group-item-action active category-btn" data-category="all">All</button>
                <button class="list-group-item list-group-item-action category-btn" data-category="friedrice">🍚 Chao Fan</button>
                <button class="list-group-item list-group-item-action category-btn" data-category="platters">🍱 Platters</button>
                <button class="list-group-item list-group-item-action category-btn" data-category="drinks">🥤 Fresh Drinks</button>
                <button class="list-group-item list-group-item-action category-btn" data-category="icecream">🍨 Ice Cream</button>
                <button class="list-group-item list-group-item-action category-btn" data-category="coffee">☕ Ice Coffee</button>
            </div>
        </div>

        <!-- Menu Content -->
        <div class="col-md-9 col-lg-10 p-4">
            <div class="row" id="menu-items">

                
            </div>
        </div>

        <div id="addons-section" class="mt-4" style="display:none;">
            <h4 class="mb-3">Add-ons</h4>
            <div class="row" id="addons-container"></div>
        </div>

    </div>
</div>

<!-- JS -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="menu.js"></script>
<script>
    $(document).ready(function () {

    renderMenu(menuList);

    // CATEGORY FILTER
    $('.category-btn').on('click', function () {
        $('.category-btn').removeClass('active');
        $(this).addClass('active');

        const category = $(this).data('category');

        if (category === 'all') {
            renderMenu(menuList);
        } else {
            const filtered = menuList.filter(x => x.category === category);
            renderMenu(filtered);
        }
        // SHOW ADDONS ONLY FOR FRIED RICE
        if (category === "friedrice") {
            $('#addons-section').show();
            renderAddOns();
        } else {
            $('#addons-section').hide();
        }

    });

});

function renderMenu(list) {

    let html = "";

    list.forEach(item => {

        // VARIETIES DISPLAY
        let varietyHtml = "";
        if (item.varieties && item.varieties.length > 0) {

            varietyHtml += `<div class="text-start small mb-2">
                                <strong>Varieties:</strong><br>`;

            item.varieties.forEach(v => {
                varietyHtml += `• ${v.name} - ₱${v.price}<br>`;
            });

            varietyHtml += `</div>`;
        }

        // FLAVORS DISPLAY
        let flavorHtml = "";
        if (item.flavors && item.flavors.length > 0) {

            flavorHtml += `<div class="text-start small mb-2">
                                <strong>Flavors:</strong><br>`;

            item.flavors.forEach(f => {
                flavorHtml += `• ${f.name} (+₱${f.price})<br>`;
            });

            flavorHtml += `</div>`;
        }

        html += `
        <div class="col-md-4 mb-4">
            <div class="card shadow-sm position-relative">

                ${item.bestSeller ? '<span class="badge bg-danger best-seller-badge">🔥 Best Seller</span>' : ''}

                <img src="${item.image}" class="card-img-top">

                <div class="card-body">
                    <h5>${item.name}</h5>
                    <p class="text-info fw-bold">₱${item.price}</p>
                    ${varietyHtml}
                    ${flavorHtml}
                </div>
            </div>
        </div>`;
    });
    $('#menu-items').html(html);
}

function renderAddOns() {

    let html = "";

    addOns.forEach(item => {
        html += `
        <div class="col-md-3 mb-3">
            <div class="card shadow-sm">
                <div class="card-body text-center">
                    <h6>${item.name}</h6>
                    <p class="text-success">+₱${item.price}</p>
                </div>
            </div>
        </div>
        `;
    });

    document.getElementById("addons-container").innerHTML = html;
}
</script>

</body>
</html>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Modern Food Menu</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #eef2f3, #dfe9f3);
        }

        h2 {
            font-weight: 600;
        }

        /* Category Buttons */
        .category-btn {
            border-radius: 50px;
            padding: 8px 18px;
            transition: 0.3s;
        }

        .category-btn.active,
        .category-btn:hover {
            background: #0d6efd;
            color: white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        /* Card Styling */
        .menu-card {
            border: none;
            border-radius: 20px;
            overflow: hidden;
            background: rgba(255,255,255,0.7);
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
        }

        .menu-card:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 12px 25px rgba(0,0,0,0.2);
        }

        /* Image */
        .menu-card img {
            height: 180px;
            object-fit: cover;
            transition: 0.4s;
        }

        .menu-card:hover img {
            transform: scale(1.1);
        }

        /* Card Body */
        .card-body h5 {
            font-weight: 600;
        }

        .price {
            color: #0d6efd;
            font-weight: bold;
            font-size: 1.1rem;
        }

        .sidebar {
    height: 100vh;
    position: sticky;
    top: 0;
    overflow-y: auto;
}

.list-group-item {
    border: none;
    border-radius: 10px;
    margin-bottom: 6px;
    transition: 0.2s;
}

.list-group-item:hover {
    background-color: #0d6efd;
    color: #fff;
}

.list-group-item.active {
    background-color: #0d6efd;
    color: #fff;
    font-weight: bold;
}

.card {
    border-radius: 15px;
    overflow: hidden;
    transition: 0.2s;
}

.card:hover {
    transform: scale(1.03);
}

.card img {
    height: 180px;
    object-fit: cover;
}
    </style>
</head>

<body>

<div class="container-fluid">
    <div class="row">

        <!-- Sidebar -->
        <div class="col-md-3 col-lg-2 bg-light sidebar p-3">
            <h5 class="mb-3">Menu</h5>

            <div class="list-group">
                <button class="list-group-item list-group-item-action active category-btn" data-category="all">All</button>
                <button class="list-group-item list-group-item-action category-btn" data-category="friedrice">🍚 Chao Fan</button>
                <button class="list-group-item list-group-item-action category-btn" data-category="platters">🍱 Platters</button>
                <button class="list-group-item list-group-item-action category-btn" data-category="drinks">🥤 Fresh Drinks</button>
                <button class="list-group-item list-group-item-action category-btn" data-category="icecream">🍨 Ice Cream</button>
                <button class="list-group-item list-group-item-action category-btn" data-category="coffee">☕ Ice Coffee</button>
            </div>
        </div>

        <!-- Menu Content -->
        <div class="col-md-9 col-lg-10 p-4">
            <div class="row" id="menu-items">

                <!-- Item -->
                <div class="col-md-4 mb-4 menu-item" data-category="friedrice">
                    <div class="card shadow-sm">
                        <span class="badge bg-danger best-seller-badge">🔥 Best Seller</span>
                        <img src="images/fried-rice.jpg" class="card-img-top">
                        <div class="card-body text-center">
                            <h5>Pork Chao Fan</h5>
                            <p class="text-info">₱120</p>
                           
                        </div>
                    </div>
                </div>

                <div class="col-md-4 mb-4 menu-item" data-category="friedrice">
                    <div class="card shadow-sm">
                        <img src="https://via.placeholder.com/300x200" class="card-img-top">
                        <div class="card-body text-center">
                            <h5>Pork Chao Fan</h5>
                            <p class="text-muted">₱130</p>
                           
                        </div>
                    </div>
                </div>

                <div class="col-md-4 mb-4 menu-item" data-category="platters">
                    <div class="card shadow-sm">
                        <img src="https://via.placeholder.com/300x200" class="card-img-top">
                        <div class="card-body text-center">
                            <h5>Chicken Platter</h5>
                            <p class="text-muted">₱180</p>
                           
                        </div>
                    </div>
                </div>

                <div class="col-md-4 mb-4 menu-item" data-category="drinks">
                    <div class="card shadow-sm">
                        <img src="https://via.placeholder.com/300x200" class="card-img-top">
                        <div class="card-body text-center">
                            <h5>Lemon Juice</h5>
                            <p class="text-muted">₱60</p>
                           
                        </div>
                    </div>
                </div>

                <div class="col-md-4 mb-4 menu-item" data-category="coffee">
                    <div class="card shadow-sm">
                        <img src="https://via.placeholder.com/300x200" class="card-img-top">
                        <div class="card-body text-center">
                            <h5>Iced Coffee</h5>
                            <p class="text-muted">₱90</p>
                           
                        </div>
                    </div>
                </div>

                <div class="col-md-4 mb-4 menu-item" data-category="icecream">
                    <div class="card shadow-sm">
                        <img src="https://via.placeholder.com/300x200" class="card-img-top">
                        <div class="card-body text-center">
                            <h5>Vanilla Ice Cream</h5>
                            <p class="text-muted">₱70</p>
                            
                        </div>
                    </div>
                </div>

            </div>
        </div>

    </div>
</div>

<!-- JS -->
<script>
    const buttons = document.querySelectorAll('.category-btn');
    const items = document.querySelectorAll('.menu-item');

    buttons.forEach(btn => {
        btn.addEventListener('click', function () {

            buttons.forEach(b => b.classList.remove('active'));
            this.classList.add('active');

            const category = this.getAttribute('data-category');

            items.forEach(item => {
                if (category === 'all' || item.getAttribute('data-category') === category) {
                    item.style.display = 'block';
                } else {
                    item.style.display = 'none';
                }
            });
        });
    });

    $('.category-btn').on('click', function () {

    $('.category-btn').removeClass('active');
    $(this).addClass('active');

    var category = $(this).data('category');

    if (category === 'all') {
        $('.menu-item').show();
    } else {
        $('.menu-item').hide();
        $('.menu-item[data-category="' + category + '"]').show();
    }
});
</script>

</body>
</html>

</body>
</html>
